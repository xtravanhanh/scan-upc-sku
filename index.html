<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Kho Hàng - Pro</title>
    <script src="https://unpkg.com/html5-qrcode@latest/html5-qrcode.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 10px; margin: 0; background: #f4f4f9; }
        #reader-container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; background: #000; border-radius: 12px; overflow: hidden; min-height: 280px; }
        #reader { width: 100%; }
        .form-group { margin: 15px 0; padding: 15px; background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        input[type="text"] { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; font-size: 17px; border: 1px solid #ccc; border-radius: 6px; }
        button { width: 100%; padding: 14px; margin: 8px 0; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        .btn-start { background: #6f42c1; color: white; }
        .btn-add { background: #28a745; color: white; }
        .btn-sync { background: #007bff; color: white; }
        .data-item { background: #f8f9fa; padding: 10px; margin: 5px 0; border-radius: 6px; border-left: 4px solid #28a745; }
    </style>
</head>
<body>
    <button class="btn-start" onclick="initScanner()">📷 BẬT CAMERA</button>
    <div id="reader-container"><div id="reader"></div></div>

    <div class="form-group">
        <label><strong>Mã UPC:</strong></label>
        <input type="text" id="upc-input" placeholder="Quét mã vạch...">
        <label><strong>Mã SKU:</strong></label>
        <input type="text" id="sku-input" placeholder="Nhập SKU...">
        <button class="btn-add" onclick="saveToLocal()">✅ LƯU TẠM (Offline)</button>
    </div>

    <button class="btn-sync" onclick="syncToSheet()">🔄 ĐỒNG BỘ LÊN GOOGLE SHEET</button>

    <div class="form-group">
        <h3>Dữ liệu chờ: <span id="count" style="color: red;">0</span></h3>
        <div id="data-items"></div>
    </div>

    <script>
        // LƯU Ý: Thay link này bằng link Web App sau khi nhấn "Deploy" mới nhất
        const scriptURL = 'https://script.google.com/macros/s/AKfycbx-6CWFCM0x3JT0lR5mmuZkhVqwvFBlUaW9SbWJI6Qy2tm8ykyagSwr-IQIy80OG906/exec';
        
        let localData = [];
        let html5QrcodeScanner = null;

        function initScanner() {
            if (html5QrcodeScanner) html5QrcodeScanner.clear().catch(() => {});
            html5QrcodeScanner = new Html5Qrcode("reader");

            const config = { fps: 15, qrbox: { width: 250, height: 100 } };
            
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                config, 
                (decodedText) => {
                    document.getElementById('upc-input').value = decodedText;
                    document.getElementById('sku-input').focus();
                    html5QrcodeScanner.pause(true);
                }
            ).catch(err => alert("Lỗi Camera: Hãy đảm bảo web chạy trên HTTPS và đã cấp quyền."));
        }

        function saveToLocal() {
            const upc = document.getElementById('upc-input').value.trim();
            const sku = document.getElementById('sku-input').value.trim();
            if (!upc || !sku) return alert("Vui lòng nhập đủ UPC và SKU!");
            
            localData.unshift({ upc, sku, time: new Date().toLocaleTimeString() });
            updateUI();
            
            document.getElementById('upc-input').value = '';
            document.getElementById('sku-input').value = '';
            if (html5QrcodeScanner) html5QrcodeScanner.resume();
        }

        function updateUI() {
            document.getElementById('count').innerText = localData.length;
            const container = document.getElementById('data-items');
            container.innerHTML = localData.map(item => `<div class="data-item"><strong>${item.upc}</strong> - ${item.sku}</div>`).join('');
        }

        async function syncToSheet() {
            if (localData.length === 0) return alert("Không có dữ liệu!");
            const btn = document.querySelector('.btn-sync');
            btn.innerText = "ĐANG ĐỒNG BỘ...";

            try {
                const response = await fetch(scriptURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(localData)
                });
                
                const result = await response.json();
                if (result.status === "success") {
                    alert("✅ Đồng bộ thành công!");
                    localData = [];
                    updateUI();
                } else {
                    throw new Error("Server từ chối: " + JSON.stringify(result));
                }
            } catch (err) {
                alert("❌ Lỗi đồng bộ: " + err.message);
            } finally {
                btn.innerText = "🔄 ĐỒNG BỘ LÊN GOOGLE SHEET";
            }
        }
    </script>
</body>
</html>
